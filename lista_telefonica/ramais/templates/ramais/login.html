{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFMG - Acesso Restrito</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ramais/css/style.css' %}">
  <style>
    body { background-color: #f4f6f9; }
    .card-login { border-top: 4px solid #28a745; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-sm card-login" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <img src="{% static 'ramais/img/logo-if.png' %}" alt="Logo IFMG" width="80" class="mb-3">
        <h4 class="fw-bold text-success">Acesso Restrito</h4>
        <p class="text-muted small">Faça login para gerenciar a lista telefônica</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger text-center p-2 mb-3" role="alert">
          Usuário ou senha incorretos.
        </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-bold text-secondary">Usuário</label>
          <input type="text" name="username" class="form-control" placeholder="Seu usuário" required autofocus>
        </div>
        
        <div class="mb-4">
          <label class="form-label fw-bold text-secondary">Senha</label>
          <input type="password" name="password" class="form-control" placeholder="********" required>
        </div>

        <button type="submit" class="btn btn-success w-100 fw-bold">Entrar</button>
      </form>

      <div class="text-center mt-4">
        <a href="{% url 'index' %}" class="text-decoration-none text-muted small">Voltar para a consulta pública</a>
      </div>
    </div>
  </div>

</body>
</html>

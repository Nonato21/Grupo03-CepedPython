{% extends 'ramais/base.html' %}

{% block title %}
  IFMG - Lista de Ramais | Editar Pessoa
{% endblock %}

{% block content %}
  <section class="mb-4">
    <span class="badge badge-if mb-3">Pessoas</span>

    <h1 class="fw-bold">Editar pessoa</h1>

    <p class="text-muted">Atualize o nome e o e-mail da pessoa selecionada.</p>
  </section>

  <section class="card card-if shadow-sm">
    <div class="card-body">
      <h5 class="card-title mb-4">Dados da pessoa</h5>

      <form method="post" action="{% url 'editar_pessoa' pessoa.id %}">
        {% csrf_token %}

        <div class="mb-3">
          <label for="nome" class="form-label">Nome completo</label>

          <input type="text" id="nome" name="nome" class="form-control" value="{{ nome|default:pessoa.nome }}" />
        </div>

        <div class="mb-4">
          <label for="email" class="form-label">E-mail corporativo</label>

          <input type="email" id="email" name="email" class="form-control" value="{{ email|default:pessoa.email }}" />
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button type="submit" class="btn btn-if">
            <i class="bi bi-floppy me-1"></i>
            Salvar alterações
          </button>

          <a href="{% url 'listar_pessoas' %}" class="btn btn-if-outline">Cancelar</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFMG - Lista de Ramais | Gerenciar Pessoas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'ramais/css/style.css' %}" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-if">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'index' %}">
        <img src="{% static 'ramais/img/logo-if.png' %}" alt="Logo" class="logo-if" />
        <span class="fw-bold">IFMG Campus São João Evangelista</span>
      </a>
    </div>
  </nav>

  <main class="container my-5">
    <section class="mb-4">
      <span class="badge badge-if mb-3">Recursos Humanos</span>
      <h1 class="fw-bold">Cadastrar Pessoas</h1>
    </section>

    <section class="card card-if shadow-sm">
      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}

      <div class="card-body">
        <h5 class="card-title mb-4">Dados do Servidor / Funcionário</h5>

        <form method="post" action="">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Nome Completo</label>
            <input type="text" name="nome" class="form-control" placeholder="Ex: João da Silva">
          </div>

          <div class="mb-3">
            <label class="form-label">E-mail Corporativo</label>
            <input type="email" name="email" class="form-control" placeholder="Ex: joao@ifmg.edu.br">
          </div>

          <div class="mb-3">
            <label class="form-label">Ramal Pessoal</label>
            <input type="text" name="ramal" class="form-control" placeholder="Ex: 1234">
          </div>

          <div class="mb-4">
            <label class="form-label">Vincular a qual Setor?</label>
              <select name="setor" class="form-select">
    <option value="" disabled selected>Clique aqui para escolher um setor...</option>
    {% for setor in setores %}
        <option value="{{ setor.id }}">{{ setor.nome }}</option>
    {% endfor %}
</select>
          </div>

          <button type="submit" class="btn btn-if">Salvar Funcionário</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>

{% extends 'ramais/base.html' %}

{% block title %}
    IFMG - Lista de Ramais | Cadastrar Usuário
{% endblock %}

{% block content %}
    <section class="mb-4">
        <span class="badge badge-if mb-3">
            Administração
        </span>
        <h1 class="fw-bold">
            Cadastrar usuário
        </h1>
        <p class="text-muted">
            Cadastre um usuário e defina seu status
            e nível de acesso.
        </p>
    </section>
    <section class="card card-if shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-4">
                Dados do usuário
            </h5>
            <form
                method="post"
                action="{% url 'gerenciar_usuarios' %}"
            >
                {% csrf_token %}
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label
                            for="nome"
                            class="form-label"
                        >
                            Nome
                        </label>
                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            class="form-control"
                            value="{{ nome|default:'' }}"
                            placeholder="Nome completo"
                        >
                    </div>
                    <div class="col-md-6">
                        <label
                            for="email"
                            class="form-label"
                        >
                            E-mail
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-control"
                            value="{{ email|default:'' }}"
                            placeholder="usuario@ifmg.edu.br"
                        >
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6 col-xl-3">
                        <label
                            for="senha"
                            class="form-label"
                        >
                            Senha
                        </label>
                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            class="form-control"
                            placeholder="********"
                        >
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <label
                            for="confirmar_senha"
                            class="form-label"
                        >
                            Confirmar senha
                        </label>
                        <input
                            type="password"
                            id="confirmar_senha"
                            name="confirmar_senha"
                            class="form-control"
                            placeholder="********"
                        >
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <label
                            for="status_usuario"
                            class="form-label"
                        >
                            Status
                        </label>
                        <select
                            id="status_usuario"
                            name="status_usuario"
                            class="form-select"
                        >
                            <option
                                value="Ativo"
                                {% if status_usuario == 'Ativo' %}selected{% endif %}
                            >
                                Ativo
                            </option>
                            <option
                                value="Inativo"
                                {% if status_usuario == 'Inativo' %}selected{% endif %}
                            >
                                Inativo
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <label
                            for="nivel_acesso"
                            class="form-label"
                        >
                            Nível de acesso
                        </label>
                        <select
                            id="nivel_acesso"
                            name="nivel_acesso"
                            class="form-select"
                        >
                            <option
                                value="Administrador"
                                {% if nivel_acesso == 'Administrador' %}selected{% endif %}
                            >
                                Administrador
                            </option>
                            <option
                                value="Usuário padrão"
                                {% if nivel_acesso == 'Usuário padrão' %}selected{% endif %}
                            >
                                Usuário padrão
                            </option>
                        </select>
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <button
                        type="submit"
                        class="btn btn-if"
                    >
                        <i class="bi bi-person-plus me-1"></i>
                        Salvar usuário
                    </button>
                    <a
                        href="{% url 'listar_usuarios' %}"
                        class="btn btn-if-outline"
                    >
                        Ver usuários
                    </a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}

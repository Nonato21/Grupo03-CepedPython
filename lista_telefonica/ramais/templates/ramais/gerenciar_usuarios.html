{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFMG - Lista de Ramais | Adicionar Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'ramais/css/style.css' %}" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-if">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'index' %}">
        <img src="{% static 'ramais/img/logo-if.png' %}" alt="Logo" class="logo-if" />
        <span class="fw-bold">IFMG Campus São João Evangelista</span>
      </a>
      
      <div class="collapse navbar-collapse justify-content-end">
        <div class="navbar-nav gap-2">
          <a href="{% url 'index' %}" class="btn btn-outline-light btn-sm">Início</a>
          <a href="{% url 'listar_usuarios' %}" class="btn btn-outline-light btn-sm">Usuários</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <section class="mb-4">
      <span class="badge badge-if mb-3">Administração</span>
      <h1 class="fw-bold">Adicionar usuário</h1>
    </section>

    <section class="card card-if shadow-sm">
      <div class="card-body">
        
        <!-- alertas de aucesso e erro -->
        {% if messages %}
          {% for message in messages %}
          <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'gerenciar_usuarios' %}">
          {% csrf_token %}

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Nome</label>
              <input type="text" name="nome" class="form-control" placeholder="Nome" value="{{ nome }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">E-mail</label>
              <input type="email" name="email" class="form-control" placeholder="E-mail" value="{{ email }}">
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-md-3">
              <label class="form-label">Senha</label>
              <input type="password" name="senha" class="form-control" placeholder="********">
            </div>
            <div class="col-md-3">
              <label class="form-label">Confirmar senha</label>
              <input type="password" name="confirmar_senha" class="form-control" placeholder="********">
            </div>
            <div class="col-md-3">
              <label class="form-label">Status</label>
              <select name="status_usuario" class="form-select">
                <option value="Ativo" {% if status_usuario == 'Ativo' %}selected{% endif %}>Ativo</option>
                <option value="Inativo" {% if status_usuario == 'Inativo' %}selected{% endif %}>Inativo</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Nível de acesso</label>
              <select name="nivel_acesso" class="form-select">
                <option value="Administrador" {% if nivel_acesso == 'Administrador' %}selected{% endif %}>Administrador</option>
                <option value="Usuário padrão" {% if nivel_acesso == 'Usuário padrão' %}selected{% endif %}>Usuário padrão</option>
              </select>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-if">Salvar Usuário</button>
            <a href="{% url 'listar_usuarios' %}" class="btn btn-if-outline">Voltar para Usuários</a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
